spring:
  datasource:
    url: jdbc:h2:mem:cms_licenses_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost/realms/test

eureka:
  client:
    enabled: false

cms:
  licenses:
    outbox:
      poll-interval-ms: 60000
      batch-size: 10
    grant-validity-years: 1
